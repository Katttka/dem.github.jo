<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSolver Pro • Отчёт студента</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Base colors */
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --surface: #1e293b;
            --surface-hover: #334155;
            
            /* Text */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            /* Accent gradients */
            --accent-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --accent-success: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --accent-warning: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            --accent-danger: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            --accent-info: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            
            /* Borders & shadows */
            --border-color: #334155;
            --border-glow: 0 0 20px rgba(99, 102, 241, 0.3);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.25);
            
            /* Code theme */
            --code-bg: #0d1117;
            --code-border: #30363d;
            --code-comment: #8b949e;
            --code-keyword: #ff7b72;
            --code-string: #a5d6ff;
            --code-function: #d2a8ff;
            --code-number: #79c0ff;
            --code-class: #ffa657;
            
            /* Animations */
            --transition-fast: 150ms ease;
            --transition-normal: 300ms ease;
            --transition-slow: 500ms ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: 
                radial-gradient(ellipse at top, #1e1b4b 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, #312e81 0%, transparent 50%),
                var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(99, 102, 241, 0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(168, 85, 247, 0.2), transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(59, 130, 246, 0.25), transparent),
                radial-gradient(1px 1px at 150px 100px, rgba(99, 102, 241, 0.2), transparent);
            background-size: 200px 200px;
            animation: float 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-200px) rotate(360deg); }
        }

        .container {
            max-width: 1000px;
            width: 100%;
            padding: 40px 24px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px 60px;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--text-secondary), transparent);
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeInDown 0.6s ease;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: var(--accent-primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: var(--border-glow), var(--shadow-lg);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3), var(--shadow-lg); }
            50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.6), var(--shadow-lg); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 560px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal), border-color var(--transition-normal);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease both;
        }

        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-primary);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg), var(--border-glow);
            border-color: #6366f1;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .icon-box {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 247, 0.2));
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .card-header h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card p {
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-size: 0.95rem;
        }

        /* Code Window */
        .code-window {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .code-header {
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--code-border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .dots {
            display: flex;
            gap: 7px;
        }

        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dot.red { background: #ff5f57; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #28c940; }

        .code-filename {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
        }

        pre {
            margin: 0;
            padding: 20px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        pre::-webkit-scrollbar {
            height: 8px;
        }
        pre::-webkit-scrollbar-track {
            background: var(--code-bg);
        }
        pre::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        /* Syntax highlighting */
        .kw { color: var(--code-keyword); font-weight: 500; }
        .str { color: var(--code-string); }
        .num { color: var(--code-number); }
        .com { color: var(--code-comment); font-style: italic; }
        .func { color: var(--code-function); }
        .cls { color: var(--code-class); font-weight: 500; }
        .imp { color: #f0f6fc; }

        /* Button */
        .btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Output Area */
        #output-area {
            display: none;
            margin-top: 24px;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-line {
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .log-line strong {
            color: var(--text-primary);
        }

        .log-success { color: #34d399 !important; font-weight: 500; }
        .log-info { color: #60a5fa !important; }
        .log-warning { color: #fbbf24 !important; font-weight: 500; }
        .log-danger { color: #f87171 !important; font-weight: 500; }
        .log-date { color: var(--text-muted); font-size: 0.85rem; }

        .task-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-warning);
            color: #1e1b4b;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-left: 8px;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
        }

        .accuracy-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-success);
            color: white;
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 1.15rem;
            font-weight: 700;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        /* Stats Table */
        .stats-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 16px 0;
            font-size: 0.92rem;
            border-radius: 12px;
            overflow: hidden;
        }

        .stats-table th {
            text-align: left;
            padding: 14px 16px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .stats-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .stats-table tr:last-child td {
            border-bottom: none;
        }

        .stats-table tr:hover {
            background: rgba(99, 102, 241, 0.08);
        }

        .stats-table td strong {
            color: var(--text-primary);
        }

        .bar-container {
            width: 120px;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bar-approve { background: var(--accent-success); }
        .bar-conditional { background: var(--accent-info); }
        .bar-review { background: var(--accent-warning); }
        .bar-reject { background: var(--accent-danger); }
        .bar-franchise { background: linear-gradient(135deg, #a855f7, #7c3aed); }

        /* Report Card Special */
        .card.report-card {
            border-left: 4px solid #10b981;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.08), rgba(30, 41, 59, 0.95));
        }

        .report-card .icon-box {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.25), rgba(5, 150, 105, 0.25));
            border-color: rgba(16, 185, 129, 0.5);
        }

        .success-banner {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(5, 150, 105, 0.1));
            border: 1px solid rgba(16, 185, 129, 0.4);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .info-box {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(37, 99, 235, 0.1));
            border-left: 4px solid #3b82f6;
            padding: 16px 20px;
            border-radius: 0 10px 10px 0;
            margin-top: 16px;
        }

        .info-box .log-info {
            margin-bottom: 8px;
            display: block;
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin: 20px 0;
